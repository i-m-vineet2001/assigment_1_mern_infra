apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-task-platform
  labels:
    app: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: DOCKERHUB_USERNAME/ai-task-platform-worker:latest
          envFrom:
            - configMapRef:
                name: backend-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Worker has no HTTP server; probes check the process is alive via a
          # lightweight file-touch heartbeat pattern is overkill here, so we
          # rely on exec probes that verify the python process is running.
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "worker.py"]
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pgrep", "-f", "worker.py"]
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
