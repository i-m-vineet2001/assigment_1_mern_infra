apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ai-task-platform
data:
  PORT: "5000"
  NODE_ENV: "production"
  MONGO_URI: "mongodb://mongo:27017/ai_task_platform"
  REDIS_URL: "redis://redis:6379"
  JWT_EXPIRES_IN: "7d"
  CORS_ORIGIN: "https://app.example.com"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
